version: '3.8'

services:
  redis:
    image: redis
    command: redis-server --requirepass 1234!
    ports:
      - "6379:6379"

  redis-commander:
    image: rediscommander/redis-commander:latest
    environment:
      - REDIS_HOSTS=local:redis:6379:0:1234!
    ports:
      - "8081:8081"
    depends_on:
      - redis